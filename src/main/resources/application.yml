spring:
  application:
    name: badminton-ecommerce

  threads:
    virtual:
      enabled: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # --- Cấu hình Mail phải nằm ở đây ---
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: BadmintonHikariCP

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

# --- Các cấu hình ngoài luồng Spring ---
logging:
  level:
    root: INFO
    com.badminton.ecommerce: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000} # 1 ngày
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 ngày

crawler:
  api-key: ${CRAWLER_API_KEY}

ai:
  groq:
    api-key: ${GROQ_API_KEY}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}