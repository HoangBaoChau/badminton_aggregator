version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: badminton-postgres
    environment:
      POSTGRES_DB: badminton_ecommerce
      POSTGRES_USER: vnb_admin
      POSTGRES_PASSWORD: "1234"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_v3.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
